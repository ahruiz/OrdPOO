<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./cajeros.css">
    <script type="application/javascript" src="./cajeros.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de cajero</title>
</head>

<body>
    <div class="main-container">
        <div class="row">
            <div class="col">
                <div class="form-container">
                    <h3>Alta de Cajero</h3>
                    <input class="input-form" type="text" name="nombre" id="nombre" placeholder="Escribe tu Nombre">
                    <input class="input-form" type="text" name="apellido" id="apellido"
                        placeholder="Escribe tu apellido">
                    <input class="input-form" type="email" name="email" id="email" placeholder="Escribe tu email">
                    <input class="input-form" type="number" name="phone" id="phone" placeholder="Escribe tu teléfono">
                    <button class="btn-form" onclick="makeFetch()">solicitar informacion</button>
                    <button class="btn-form" onclick="crear_cajero()">Crear cajero</button>
                    <button class="btn-form1" onclick="location.href='../cajeros/cajeros.html'">Volver a
                        Cajeros</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container" id="element"></div>

</html>
