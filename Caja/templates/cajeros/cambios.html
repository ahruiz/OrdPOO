<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'cajeros/cajeros.css' %}">
    <script>window.STATIC_URL = "{% static '' %}"</script>
    <script type="application/javascript" src="{% static 'cajeros/cajeros.js' %}" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cambios de cajero</title>
</head>

<body>
    <div class="main-container">
        <div class="row">
            <div class="col">
                <div class="form-container">
                    <h1 class="title">Modificación de Cajero</h1>
                    <input class="input-form" type="number" name="id" id="id" placeholder="ID del cajero a modificar">
                    <p class="radio-title">Campo a modificar</p>
                    <div class="radio-group" id="type">
                        <input type="radio" name="camp_mod" id="cam_nom" value="nombre" checked> Nombre
                        <input type="radio" name="camp_mod" id="cam_ape" value="apellido"> Apellido
                        <input type="radio" name="camp_mod" id="cam_email" value="email"> Email
                        <input type="radio" name="camp_mod" id="cam_phone" value="phone"> Teléfono
                    </div>
                    <input class="input-form" type="text" name="value" id="value" placeholder="Nuevo valor">
                    <button class="btn-form" onclick="makeFetch()">solicitar informacion</button>
                    <button type="button" class="btn-form" onclick="modifica_cajero()">Modificar cajero</button>
                    <button class="btn-form1" onclick="location.href='{% url 'cajeros' %}'">Volver a
                        Cajeros</button>
                    <button class="btn-form1" onclick="location.href='{% url 'menu_ppal' %}'">Volver a
                        MENU PPAL
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="container" id="element"></div>
</body>

</html>

</html>
