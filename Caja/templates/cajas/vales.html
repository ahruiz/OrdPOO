<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'cajas/cajas.css' %}">
    <script>window.STATIC_URL = "{% static '' %}"</script>
    <script type="application/javascript" src="{% static 'cajas/cajas.js' %}" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vales de CAJA</title>
</head>

<body>
    <div class="main-container">
        <div class="row">
            <div class="col">
                <div class="form-container">
                    <h1>Vales de CAJA</h1>
                    <select id="caja" class="input-form" required>
                        <option value="">Seleccione una caja</option>
                        <script>
                            // Cargar las cajas disponibles desde el backend
                            fetch('/api/cajas/')
                                .then(response => response.json())
                                .then(data => {
                                    const cajaSelect = document.getElementById('caja');
                                    data.forEach(caja => {
                                        const option = document.createElement('option');
                                        option.value = caja.id;
                                        option.textContent = `CAJA #${caja.id}`;
                                        cajaSelect.appendChild(option);
                                    });
                                })
                                .catch(error => console.error('Error al cargar cajas:', error));
                        </script>
                    </select>
                    <select id="cajero" class="input-form" required>
                        <option value="">Seleccione un cajero</option>
                        <script>
                            // Cargar los cajeros disponibles desde el backend
                            fetch('/api/cajeros/')
                                .then(response => response.json())
                                .then(data => {
                                    const cajeroSelect = document.getElementById('cajero');
                                    data.forEach(cajero => {
                                        const option = document.createElement('option');
                                        option.value = cajero.id;
                                        option.textContent = `${cajero.name.toUpperCase()} ${cajero.last_name.toUpperCase()}`;
                                        cajeroSelect.appendChild(option);
                                    });
                                })
                                .catch(error => console.error('Error al cargar cajeros:', error));
                        </script>
                    </select>
                    <input class="input-form" type="number" name="monto" id="monto" placeholder="Monto del Vale">
                    <select id="MotivoDelVale" class="input-form" required>
                        <option value="">Seleccione un motivo</option>
                        <option value="FALTANTE_ARQUEO">Faltante en Arqueo de Caja</option>
                        <option value="ANTICIPO">Anticipo / Préstamo Corto</option>
                        <option value="OTRO">Otro Motivo Descriptivo</option>
                    </select>
                    <input class="input-form" type="text" name="comentario" id="comentario" placeholder="Observaciones">
                    <button class="btn-form" onclick="solicitarValesCaj()">solicitar vales pendientes</button>
                    <button class="btn-form1" onclick="location.href='{% url 'cajas' %}'">Volver a
                        Cajeros
                    </button>
                    <button class="btn-form1" onclick="location.href='{% url 'menu_ppal' %}'">Volver a
                        MENU PPAL
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="container" id="element"></div>
    <div class="text-card" id="mensaje"></div>
</body>

</html>
