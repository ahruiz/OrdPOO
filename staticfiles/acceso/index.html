{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAJA CHICA - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'acceso/acceso.css' %}">
    <script src="{% static 'acceso/acceso.js' %}" defer></script>
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">CAJA CHICA</a>
        </div>
    </nav>

    <main class="auth-page" data-redirect="{% static 'menuppal/p_ppal.html' %}">
        <section class="auth-card">
            <div class="auth-header text-center">
                <img class="auth-logo" src="{% static 'acceso/caja_ch.jpg' %}" alt="Caja Chica">
                <h1>CAJA CHICA</h1>
                <p class="auth-subtitle">Sistema de gestión de recursos y gastos menores</p>
            </div>

            <ul class="nav nav-tabs auth-tabs" id="accesoTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-panel"
                        type="button" role="tab" aria-controls="login-panel" aria-selected="true">Iniciar
                        sesión</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup-panel"
                        type="button" role="tab" aria-controls="signup-panel" aria-selected="false">Registrarse</button>
                </li>
            </ul>

            <div class="tab-content auth-tab-content" id="accesoTabsContent">
                <div class="tab-pane fade show active" id="login-panel" role="tabpanel" aria-labelledby="login-tab">
                    <form id="loginForm" class="auth-form" novalidate>
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control input-form" id="loginEmail" name="email"
                                placeholder="usuario@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control input-form" id="loginPassword" name="password"
                                placeholder="Contraseña" required>
                        </div>
                        <button type="submit" class="btn btn-form w-100">Iniciar sesión</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="signup-panel" role="tabpanel" aria-labelledby="signup-tab">
                    <form id="signupForm" class="auth-form" novalidate>
                        <div class="mb-3">
                            <label for="signupNombre" class="form-label">Nombre completo</label>
                            <input type="text" class="form-control input-form" id="signupNombre" name="nombre"
                                placeholder="Nombre y apellido" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupEmail" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control input-form" id="signupEmail" name="email"
                                placeholder="usuario@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupPassword" class="form-label">Contraseña</label>
                            <input type="password" class="form-control input-form" id="signupPassword" name="password"
                                placeholder="Contraseña" minlength="4" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupPasswordConfirm" class="form-label">Confirmar contraseña</label>
                            <input type="password" class="form-control input-form" id="signupPasswordConfirm"
                                name="passwordConfirm" placeholder="Repite la contraseña" minlength="4" required>
                        </div>
                        <button type="submit" class="btn btn-form w-100">Crear cuenta</button>
                    </form>
                </div>
            </div>

            <div id="authMessage" class="auth-message" role="alert" hidden></div>
        </section>
    </main>

    <div class="ticker">
        <div class="ticker-text">
            Bienvenido al sistema de Caja Chica - Desarrollado por Ahruiz &nbsp;&nbsp;&nbsp;
            Sistema para la gestión eficiente de recursos y gastos menores en tu organización.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
